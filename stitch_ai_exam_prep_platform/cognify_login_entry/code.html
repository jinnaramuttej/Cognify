<body class="text-on-background antialiased overflow-hidden">
<!-- Split Screen Layout -->
<main class="flex min-h-screen">
<!-- Left: Visual Anchor (Hidden on Navigation/Mobile contexts based on Shell Visibility & Relevance) -->
<section class="hidden lg:flex lg:w-1/2 relative bg-surface overflow-hidden">

                    The best minds prepare differently.
                </h2>
<div class="mt-8 flex items-center gap-4">
<div class="h-[1px] w-12 bg-primary-container/40"></div>
<span class="text-on-surface-variant font-label text-sm tracking-widest uppercase">Est. 2026</span>
</div>
</div>
</section>
<!-- Right: Transactional Canvas -->
<section class="w-full lg:w-1/2 flex flex-col items-center justify-center bg-surface-container-lowest p-8 md:p-12 lg:p-24 relative">
<!-- Logo Anchor (from Shared Components Logic) -->
<header class="absolute top-12 left-12 lg:left-24">
<h1 class="font-headline text-2xl font-semibold text-primary tracking-tight">Cognify 2026</h1>
</header>
<div class="w-full max-w-[400px] flex flex-col gap-10">
<div class="space-y-3">
<h2 class="font-headline text-4xl text-on-surface tracking-tight">Welcome back</h2>
<p class="text-on-surface-variant font-body text-sm">Please enter your credentials to access your dashboard.</p>
</div>
<!-- Login Form -->
<form class="flex flex-col gap-8">
<div class="space-y-6">
<!-- Email Field -->
<div class="space-y-2">
<label class="block text-[11px] font-bold tracking-widest text-on-surface-variant uppercase ml-1">Email Address</label>
<input class="w-full h-12 px-4 bg-surface-container-highest border-0 rounded-md focus:ring-0 focus:outline focus:outline-primary-fixed-dim/50 text-on-surface placeholder:text-outline/50 transition-all font-body text-sm" placeholder="name@domain.com" type="email"/>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="block text-[11px] font-bold tracking-widest text-on-surface-variant uppercase">Password</label>
<a class="text-[11px] font-bold tracking-widest text-primary-fixed-dim uppercase hover:text-primary transition-colors underline decoration-primary-fixed-dim/30 underline-offset-4" href="#">Forgot?</a>
</div>
<input class="w-full h-12 px-4 bg-surface-container-highest border-0 rounded-md focus:ring-0 focus:outline focus:outline-primary-fixed-dim/50 text-on-surface placeholder:text-outline/50 transition-all font-body text-sm" placeholder="••••••••" type="password"/>
</div>
</div>
<div class="flex flex-col gap-4">
<!-- Primary Action -->
<button class="w-full h-14 bg-primary text-on-primary font-label font-semibold rounded-md hover:brightness-95 active:scale-[0.98] transition-all editorial-shadow flex items-center justify-center gap-2" type="submit">
                            Continue
                            <span class="material-symbols-outlined text-lg">arrow_right_alt</span>
</button>
<div class="flex items-center gap-4 py-2">
<div class="h-[1px] flex-1 bg-surface-container-high"></div>
<span class="text-[10px] font-bold text-outline uppercase tracking-widest">Or</span>
<div class="h-[1px] flex-1 bg-surface-container-high"></div>
</div>
<!-- Secondary Action -->
<button class="w-full h-14 bg-secondary-container text-on-secondary-container font-label font-semibold rounded-md hover:bg-surface-container-high active:scale-[0.98] transition-all flex items-center justify-center gap-3" type="button">

<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>

</form>
<!-- Signup Option -->
<footer class="mt-6 text-center">
<p class="text-sm font-body text-on-surface-variant">

                        <a class="text-primary-fixed font-semibold hover:underline decoration-primary-fixed/30 underline-offset-4 ml-1 transition-all" href="#">Sign up for free</a>
</p>
</footer>
